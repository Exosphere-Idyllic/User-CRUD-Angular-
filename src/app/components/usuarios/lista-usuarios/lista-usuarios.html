<div class="lista-container">
  <div class="header-section">
    <h2>Gestión de Usuarios</h2>
    <span class="spacer"></span>
    <button class="btn-purple" (click)="openForm()">
      <span class="icon">+</span> Nuevo Usuario
    </button>
  </div>

  <div class="table-card" *ngIf="!mostrarFormulario">
    <div class="table-responsive">
      <table class="modern-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>Rol</th>
            <th class="text-right">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let user of usuarios">
            <td><span class="id-badge">#{{ user.id }}</span></td>
            <td class="font-medium">{{ user.nombre }}</td>
            <td class="text-muted">{{ user.email }}</td>
            <td>
              <span class="role-badge" [ngClass]="user.rol">{{ user.rol | titlecase }}</span>
            </td>
            <td class="actions text-right">
              <button class="action-btn edit" (click)="editUsuario(user)" title="Editar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
              </button>
              <button class="action-btn delete" (click)="deleteUsuario(user.id)" title="Eliminar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"></polyline>
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                  <line x1="10" y1="11" x2="10" y2="17"></line>
                  <line x1="14" y1="11" x2="14" y2="17"></line>
                </svg>
              </button>
            </td>
          </tr>
          <tr *ngIf="usuarios.length === 0">
            <td colspan="5" class="empty-state">No hay usuarios registrados.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Form Component integration -->
  <div class="form-wrapper" *ngIf="mostrarFormulario">
    <app-form-usuario 
      [usuario]="usuarioSelecionado"
      (save)="saveUsuario($event)"
      (cancel)="closeForm()">
    </app-form-usuario>
  </div>
</div>
