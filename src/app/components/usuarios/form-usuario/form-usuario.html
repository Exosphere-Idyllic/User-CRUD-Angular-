<div class="form-card">
  <h3>{{ usuario ? 'Editar Usuario' : 'Nuevo Usuario' }}</h3>
  <form (ngSubmit)="onSubmit()" #userForm="ngForm" class="modern-form">
    
    <div class="form-group">
      <label for="nombre">Nombre</label>
      <input type="text" id="nombre" name="nombre" [(ngModel)]="formData.nombre" required placeholder="Ingresa el nombre completo">
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" [(ngModel)]="formData.email" required placeholder="correo@ejemplo.com">
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" [(ngModel)]="formData.password" required placeholder="Contraseña">
    </div>

    <div class="form-group">
      <label for="rol">Rol</label>
      <select id="rol" name="rol" [(ngModel)]="formData.rol" required>
        <option value="usuario">Trainer</option>
        <option value="admin">Administrador</option>
        <option value="uma">Uma</option>
      </select>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-outline" (click)="onCancel()">Cancelar</button>
      <button type="submit" class="btn-purple" [disabled]="userForm.invalid">Guardar</button>
    </div>
  </form>
</div>
